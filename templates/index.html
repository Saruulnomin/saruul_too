<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цалин Dashboard — Centered</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
<style>
:root{
  --bg:#0b0b12; --panel:#121425; --panel-2:#171a31; --text:#e6e7ef;
  --muted:#9aa3b2; --primary:#7c9bff; --primary-2:#6be7c8;
  --warn:#ffc857; --pos:#7bd88f; --chip-low: rgba(255,200,87,.18);
  --chip-high: rgba(123,216,143,.18); --ring: 0 0 0 3px rgba(124,155,255,.25);
  --radius:16px; --shadow:0 15px 35px rgba(0,0,0,.6);
}
*{box-sizing:border-box;}
html,body{height:100%; margin:0; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);}
.container{max-width:1200px; margin:40px auto; padding:0 24px 60px;}
header{display:flex; align-items:center; justify-content:center; gap:14px; margin:22px 0 28px;}
h1{margin:0; font-size:clamp(22px,3.5vw,34px); font-weight:700;
    background:linear-gradient(90deg,var(--primary),var(--primary-2));
    -webkit-background-clip:text; -moz-background-clip:text; background-clip:text; color:transparent;}
.panel{background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02)), var(--panel);
       border-radius:var(--radius); padding:22px; margin-top:16px; box-shadow:var(--shadow);}
form{display:grid; grid-template-columns:repeat(12,1fr); gap:14px;}
.field{grid-column: span 3;}
.field label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px;}
input[type="text"], input[type="number"], select{width:100%; padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,.08); background:var(--panel-2); color:var(--text);}
.actions{grid-column: span 12; display:flex; gap:10px; flex-wrap:wrap;}
.btn{padding:12px 16px; border-radius:12px; font-weight:600; cursor:pointer; border:none;}
.btn-primary{background:linear-gradient(135deg,var(--primary),#5477ff); color:#fff;}
.btn-ghost{background:transparent; color:var(--text); border:1px dashed rgba(255,255,255,.16);}
.table-wrap{overflow:auto; border-radius:var(--radius); border:1px solid rgba(255,255,255,.06);}
table{width:100%; border-collapse:separate; border-spacing:0; min-width:900px; text-align:center;}
th,td{padding:12px; vertical-align:middle;}
thead th{position:sticky; top:0; background:linear-gradient(180deg, rgba(124,155,255,.18), rgba(124,155,255,.06)); cursor:pointer; color:#eaf0ff;}
tbody tr:hover{background:rgba(124,155,255,.06);}
.row-actions{display:flex; gap:6px; justify-content:center; align-items:center;}
.chip{display:inline-flex; justify-content:center; align-items:center; min-width:60px; border-radius:999px; padding:6px 10px; border:1px solid rgba(255,255,255,.1);}
.chip-low{background:var(--chip-low);}
.chip-high{background:var(--chip-high);}
.chip-ot{background:rgba(255,200,87,.15);}
@media (max-width: 1024px){.field{grid-column: span 6}}
@media (max-width: 640px){.field{grid-column: span 12}}
</style>
</head>
<body>
<div class="container">
  <header><h1>Цалин Тооцоолох Систем</h1></header>
  <section class="panel">
    <form id="salaryForm">
      <div class="field"><label>Ажилтны нэр</label><input type="text" id="name" required></div>
      <div class="field"><label>Нэг цагийн үнэлгээ</label><input type="number" step="0.01" min="0" id="hourly_rate" required></div>
      <div class="field"><label>Сард ажилласан цаг</label><input type="number" step="0.1" min="0" id="month_hours" required></div>
      <div class="field"><label>Илүү цаг</label><input type="number" step="0.1" min="0" id="overtime_hours" required></div>
      <div class="field"><label>Татвар (%)</label><input type="number" step="0.01" min="0" max="100" id="tax_rate" value="10" required></div>
      <div class="actions">
        <button type="submit" class="btn btn-primary">Тооцоолоод нэмэх</button>
        <button type="button" id="resetForm" class="btn btn-ghost">Маягтыг цэвэрлэх</button>
      </div>
    </form>
  </section>
  <section class="panel">
    <div class="table-wrap">
      <table id="salaryTable">
        <thead>
          <tr>
            <th data-sort="name">Нэр</th>
            <th data-sort="month_hours">Сард ажилласан цаг</th>
            <th data-sort="overtime_hours">Илүү цаг</th>
            <th data-sort="regular_pay">Үндсэн цалин</th>
            <th data-sort="overtime_pay">Илүү цагийн цалин</th>
            <th data-sort="tax">Татвар</th>
            <th data-sort="net_salary">Нийт цалин</th>
            <th data-sort="total_hours">Нийт ажилласан цаг</th>
            <th>Үйлдэл</th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <td colspan="6" style="text-align:right">Нийт дүн</td>
            <td id="totalNet">0</td>
            <td id="totalHours">0</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </section>
  <section class="panel">
    <canvas id="salaryChart" height="120"></canvas>
  </section>
</div>

<script>
const form=document.getElementById('salaryForm'), tbody=document.querySelector('#salaryTable tbody'), ctx=document.getElementById('salaryChart').getContext('2d');
let rowsData=JSON.parse(localStorage.getItem('salaryRows')||'[]'), chart, sortState={key:null, dir:1};
const fmtMoney=v=>new Intl.NumberFormat('mn-MN',{style:'currency',currency:'MNT',maximumFractionDigits:0}).format(v);
const fmtNum=(v,d=1)=>Number(v??0).toLocaleString('mn-MN',{maximumFractionDigits:d});
const persist=()=>localStorage.setItem('salaryRows',JSON.stringify(rowsData));

form.addEventListener('submit',e=>{
  e.preventDefault();
  const name=document.getElementById('name').value.trim();
  const hourly_rate=parseFloat(document.getElementById('hourly_rate').value)||0;
  const month_hours=parseFloat(document.getElementById('month_hours').value)||0;
  const overtime_hours=parseFloat(document.getElementById('overtime_hours').value)||0;
  const tax_rate=parseFloat(document.getElementById('tax_rate').value)||0;
  const regular_pay=month_hours*hourly_rate;
  const overtime_pay=overtime_hours*hourly_rate*1.5;
  const gross_salary=regular_pay+overtime_pay;
  const tax=gross_salary*(tax_rate/100);
  const net_salary=gross_salary-tax;
  const total_hours=month_hours+overtime_hours;
  const row={id:crypto.randomUUID(), name,hourly_rate,month_hours,overtime_hours,tax_rate,regular_pay,overtime_pay,tax,net_salary,total_hours};
  rowsData.push(row); persist(); renderTable(); form.reset(); document.getElementById('name').focus();
});

document.getElementById('resetForm').addEventListener('click',()=>form.reset());

function renderTable(){
  tbody.innerHTML=''; let totalNet=0,totalHours=0;
  const data=[...rowsData];
  if(sortState.key)data.sort((a,b)=>{
    const va=a[sortState.key],vb=b[sortState.key];
    if(typeof va==='string')return sortState.dir*va.localeCompare(vb,'mn');
    return sortState.dir*((va??0)-(vb??0));
  });
  data.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${r.name}</td>
      <td>${fmtNum(r.month_hours,1)}</td>
      <td><span class="chip chip-ot">${fmtNum(r.overtime_hours,1)}</span></td>
      <td>${fmtMoney(r.regular_pay)}</td>
      <td><span class="chip chip-high">${fmtMoney(r.overtime_pay)}</span></td>
      <td>${fmtMoney(r.tax)}</td>
      <td>${fmtMoney(r.net_salary)}</td>
      <td>${fmtNum(Math.round(r.total_hours),0)}</td>
      <td class="row-actions">
        <button class="icon-btn" data-edit="${r.id}">Засах</button>
        <button class="icon-btn" data-del="${r.id}">Устгах</button>
      </td>
    `;
    tbody.appendChild(tr);
    totalNet+=r.net_salary; totalHours+=r.total_hours;
  });
  document.getElementById('totalNet').innerText=fmtMoney(totalNet);
  document.getElementById('totalHours').innerText=fmtNum(Math.round(totalHours),0);
  updateChart();
}

tbody.addEventListener('click',e=>{
  const del=e.target.closest('[data-del]'), ed=e.target.closest('[data-edit]');
  if(del){rowsData=rowsData.filter(r=>r.id!==del.dataset.del); persist(); renderTable();}
  if(ed){
    const row=rowsData.find(r=>r.id===ed.dataset.edit); if(!row)return;
    const name=prompt('Нэр',row.name)||row.name;
    const hourly=parseFloat(prompt('Нэг цагийн үнэлгээ',row.hourly_rate)||row.hourly_rate)||0;
    const mh=parseFloat(prompt('Сард ажилласан цаг',row.month_hours)||row.month_hours)||0;
    const oh=parseFloat(prompt('Илүү цаг',row.overtime_hours)||row.overtime_hours)||0;
    const taxr=parseFloat(prompt('Татвар (%)',row.tax_rate)||row.tax_rate)||0;
    const regular_pay=mh*hourly;
    const overtime_pay=oh*hourly*1.5;
        const gross_salary=regular_pay+overtime_pay;
    const tax=gross_salary*(taxr/100);
    const net_salary=gross_salary-tax;
    const total_hours=mh+oh;
    Object.assign(row,{
      name,
      hourly_rate:hourly,
      month_hours:mh,
      overtime_hours:oh,
      tax_rate:taxr,
      regular_pay,
      overtime_pay,
      tax,
      net_salary,
      total_hours
    });
    persist(); renderTable();
  }
});

function updateChart(){
  const labels=rowsData.map(r=>r.name),
        netSalaries=rowsData.map(r=>r.net_salary),
        overtimePays=rowsData.map(r=>r.overtime_pay);
  if(chart) chart.destroy();
  chart=new Chart(ctx,{
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'Нийт цалин', data:netSalaries, backgroundColor:'rgba(124,155,255,0.7)', borderRadius:8, borderSkipped:false},
        {label:'Илүү цагийн цалин', data:overtimePays, backgroundColor:'rgba(123,216,143,0.7)', borderRadius:8, borderSkipped:false}
      ]
    },
    options:{
      responsive:true,
      interaction:{mode:'index', intersect:false},
      plugins:{legend:{position:'top', labels:{color:'#e6e7ef'}}},
      scales:{
        x:{ticks:{color:'#cfd5e3'}, grid:{display:false}},
        y:{ticks:{color:'#cfd5e3', callback:v=>new Intl.NumberFormat('mn-MN').format(v)}, grid:{color:'rgba(255,255,255,.06)'}}
      }
    }
  });
}

renderTable();
</script>
</body>
</html>
